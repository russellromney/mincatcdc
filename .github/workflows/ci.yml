name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu = x86_64 (exercises the SSE4.1/AVX2 SIMD paths, the prefetch
        # fix, and the cross-SIMD-width determinism test); macos = arm64 (NEON).
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: clippy (lib + tests)
        run: cargo clippy --lib --tests -- -D warnings
      - name: build (all targets)
        run: cargo build --all-targets
      - name: test
        run: cargo test --release

  # Run the cross-SIMD-width determinism test under Intel SDE so the AVX-512
  # argmin path actually executes (and is checked against the scalar oracle) even
  # though GitHub runners may lack AVX-512 hardware.
  avx512:
    name: avx512 (SDE emulation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: petarpetrovt/setup-sde@v2.4
      - name: Build tests
        run: cargo test --release --no-run
      - name: cross-impl determinism under emulated AVX-512 (Sapphire Rapids)
        run: ${SDE_PATH}/sde64 -spr -- cargo test --release test_simd_widths_agree_with_scalar -- --nocapture
